<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0000,#2b0000,#000);
    font-family:'Arial',sans-serif;
}

.container{
    text-align:center;
    z-index:10;
    padding:20px;
}

.title{
    color:#ff4d6d;
    font-size:4rem;
    font-weight:bold;
    text-shadow:
        0 0 10px #ff4d6d,
        0 0 20px #ff4d6d,
        0 0 40px #ff4d6d,
        0 0 80px #ff4d6d;
    animation:pulse 2s infinite;
}

.message{
    margin-top:20px;
    color:white;
    font-size:1.5rem;
    opacity:0;
    animation:fadeIn 2s forwards;
    animation-delay:3s;
}

.heart{
    position:absolute;
    color:#ff2d55;
    font-size:25px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.final-message{
    position:absolute;
    bottom:50px;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:1.2rem;
    opacity:0;
    animation:fadeIn 2s forwards;
    animation-delay:6s;
}
</style>
</head>

<body>

<div class="container">
    <div class="title" id="title">
        Feliz Aniversário ❤️
    </div>

    <div class="message" id="message">
        Meu Amor 🌹
    </div>
</div>

<div class="final-message">
    Que os teus 17 anos sejam repletos de felicidade ✨
</div>

<script>
function createHeart() {
    const heart = document.createElement("div");

    heart.classList.add("heart");

    const items = ["❤️","🌹","💖","💕"];

    heart.innerHTML =
        items[Math.floor(Math.random()*items.length)];

    heart.style.left =
        Math.random()*100 + "vw";

    heart.style.animationDuration =
        (Math.random()*4 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    },7000);
}

setInterval(createHeart,200);

setTimeout(()=>{
    document.getElementById("title").innerHTML =
    "Meu Amor ❤️";
},4000);

setTimeout(()=>{
    document.getElementById("message").innerHTML =
    "Hoje celebramos os teus 17 anos 🎂✨";
},7000);

setTimeout(()=>{
    document.getElementById("title").innerHTML =
    "Te amo!❤️";
},10000);
</script>

</body>
</html>
